<svg width="600" height="150" viewBox="0 0 600 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="100">
      <stop offset="0%" stop-color="#00A3FF" />
      <stop offset="100%" stop-color="#0055FF" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');
      .logo-text {
        font-family: 'Fira Code', monospace;
        font-weight: 700;
        font-size: 64px;
        fill: #FFFFFF;
        letter-spacing: -1px;
      }
      .logo-sub {
        font-family: 'Fira Code', monospace;
        font-weight: 400;
        font-size: 14px;
        fill: #FFFFFF;
        letter-spacing: 5px;
      }
    </style>
  </defs>

  <!-- Logo Icon -->
  <g transform="translate(30, 15)">
    <!-- Outer Shield -->
    <path d="M50 0 L100 20 V60 C100 90 75 110 50 120 C25 110 0 90 0 60 V20 L50 0 Z" fill="#161B22" stroke="url(#shieldGrad)" stroke-width="4" filter="url(#glow)"/>
    <!-- Inner lines (Cyber) -->
    <path d="M50 15 L85 30 V55 C85 75 65 90 50 100 C35 90 15 75 15 55 V30 L50 15 Z" fill="none" stroke="#00A3FF" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Terminal Prompt ">_" inside the shield -->
    <path d="M35 45 L50 60 L35 75" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="55" y1="75" x2="70" y2="75" stroke="#00A3FF" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  </g>

  <!-- Logo Text -->
  <text x="160" y="90" class="logo-text">SYSWARDEN</text>
  <text x="165" y="118" class="logo-sub" fill="#FFFFFF">ACTIVE DEFENSE HIDS/HIPS</text>
</svg>
