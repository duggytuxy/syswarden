name: Plumber Compliance
on:
  push:
    branches: [main]
    tags: ['v*']

# OSSF Scorecard: Enforce strict read-all at the top-level
permissions: read-all

jobs:
  plumber:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write          # required to securely push Plumber Score via OIDC
      security-events: write   # required to upload SARIF to Code Scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: getplumber/plumber@5302ddc7d9f1c9edb3f617bff04a09be452bcfe2 # v0.3.79
        with:
          score-push: true
          threshold: 80
